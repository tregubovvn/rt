<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:AD — Активное Чтение</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
            --text: #2d3436;
            --text-light: #636e72;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 50%, #fd79a8 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- App Container --- */
        .app-wrapper {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            transition: all 0.5s ease;
        }

        /* --- Header --- */
        .header-bar {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .header-title { 
            font-weight: 700; 
            font-size: 16px; 
            color: var(--text);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .progress-pips { display: flex; gap: 8px; }
        .pip {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pip.active { 
            background: var(--accent); 
            transform: scale(1.3);
            box-shadow: 0 0 10px var(--accent);
        }
        .pip.done { background: var(--success); }

        /* --- Screens --- */
        .screen {
            padding: 40px;
            display: none;
            flex-direction: column;
            flex: 1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Auth Screen --- */
        .logo-text {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(to right, #6c5ce7, #e84393);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        p.subtitle { color: var(--text-light); margin-bottom: 40px; font-size: 16px; }
        
        .input-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); }
        
        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.6);
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }

        .btn {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background: #b2bec3; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-secondary { 
            background: transparent; 
            color: var(--text-main); 
            border: 2px solid rgba(0,0,0,0.1); 
            margin-top: 12px; 
            box-shadow: none;
            color: var(--text);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.2); }

        /* --- Process UI --- */
        .timer-bar { 
            height: 6px; 
            background: rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            border-radius: 3px; 
            overflow: hidden;
        }
        .timer-fill { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, var(--success), #55efc4); 
            transition: width 1s linear, background 0.5s;
            border-radius: 3px;
        }

        .content-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 30px;
            flex: 1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
            color: #2d3436;
        }

        /* --- Questions UI --- */
        .question-title { font-size: 22px; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        
        .option-item { 
            padding: 16px 20px; 
            border: 2px solid rgba(0,0,0,0.05); 
            border-radius: 12px; 
            cursor: pointer; 
            background: white; 
            transition: all 0.2s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        .option-item:hover { 
            border-color: var(--accent); 
            background: rgba(108, 92, 231, 0.05);
            transform: translateX(5px);
        }
        .option-item.selected { 
            background: rgba(108, 92, 231, 0.1); 
            border-color: var(--accent); 
            color: var(--accent);
            font-weight: 700;
        }
        .option-item.correct { background: rgba(0, 184, 148, 0.1); border-color: var(--success); color: var(--success); }
        .option-item.wrong { background: rgba(214, 48, 49, 0.1); border-color: var(--danger); color: var(--danger); }

        .feedback-msg { 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 16px; 
            font-weight: 600; 
            display: none; 
            text-align: center;
        }
        .fb-error { background: rgba(255, 234, 234, 0.7); color: var(--danger); border: 1px solid var(--danger); display: block; }
        .fb-success { background: rgba(234, 255, 241, 0.7); color: var(--success); border: 1px solid var(--success); display: block; }
        
        /* --- Results --- */
        .result-header { text-align: center; margin-bottom: 40px; padding-top: 20px; animation: bounceIn 0.8s; }
        
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .grade-circle { 
            width: 120px; height: 120px; 
            background: linear-gradient(135deg, var(--accent), #e84393); 
            color: white; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 48px; font-weight: 800; 
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 20px; }
        th, td { padding: 12px 16px; text-align: left; background: rgba(255,255,255,0.6); }
        th { font-weight: 600; color: var(--text-light); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        tr td:first-child { border-radius: 10px 0 0 10px; }
        tr td:last-child { border-radius: 0 10px 10px 0; }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-correct { background: rgba(0, 184, 148, 0.2); color: var(--success); }
        .status-wrong { background: rgba(214, 48, 49, 0.2); color: var(--danger); }

        /* Loader */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- Header -->
    <div class="header-bar" id="main-header">
        <div class="header-title">
            <span id="header-step">Фрагмент 1</span>
            <span class="badge" id="header-badge">Чтение</span>
        </div>
        <div class="progress-pips" id="pips-container"></div>
    </div>

    <!-- Screen 1: Auth -->
    <div class="screen" id="screen-auth" style="display: flex;">
        <div class="logo-text">RE:AD</div>
        <p class="subtitle">Платформа осмысленного чтения</p>
        
        <div class="input-group">
            <label>ФИО студента</label>
            <input type="text" id="input-fio" placeholder="Иванов Иван Иванович">
        </div>

        <div class="input-group">
            <label>Источник данных</label>
            <input type="file" id="file-input" accept=".xml" style="display:none;">
            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
                <span id="file-btn-text">Выбрать XML файл</span>
            </button>
            <div style="font-size:13px; color:var(--text-light); text-align:center; margin:8px 0;" id="file-status">Файл не выбран</div>
        </div>

        <button class="btn" id="btn-start" disabled onclick="startTest()">Начать тестирование</button>
        <button class="btn btn-secondary" onclick="loadDemoData()">Или загрузить демо</button>
    </div>

    <!-- Screen 2: Process -->
    <div class="screen" id="screen-process">
        <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
        <div class="content-box" id="content-area">Загрузка...</div>
        <div id="controls-area"></div>
    </div>

    <!-- Screen 3: Results -->
    <div class="screen" id="screen-result">
        <div class="result-header">
            <div class="grade-circle" id="final-grade-val">5</div>
            <h1 id="final-fio" style="font-size: 24px;">ФИО</h1>
            <p style="color: var(--text-light); margin-top: 5px;">Тест завершен</p>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
            <div style="background: rgba(255,255,255,0.6); padding:20px; border-radius:16px; text-align:center;">
                <div style="font-size:28px; font-weight:800; color:var(--text);" id="stat-time">0с</div>
                <div style="font-size:12px; color:var(--text-light); text-transform:uppercase;">Время</div>
            </div>
            <div style="background: rgba(255,255,255,0.6); padding:20px; border-radius:16px; text-align:center;">
                <div style="font-size:28px; font-weight:800; color:var(--text);" id="stat-errors">0</div>
                <div style="font-size:12px; color:var(--text-light); text-transform:uppercase;">Ошибок</div>
            </div>
        </div>

        <h3 style="margin-bottom:15px; font-size:14px; text-transform:uppercase; letter-spacing:1px; color:var(--text-light);">История ответов</h3>
        <table id="results-table">
            <thead><tr><th>Вопрос</th><th>Ответ</th><th>Статус</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // --- State ---
    const App = {
        fragments: [],
        currentFragIdx: 0,
        currentQIdx: 0,
        mode: 'reading',
        timer: null,
        seconds: 0,
        results: { times: [], answers: [] }
    };

    // --- Init & URL Loader ---
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const url = params.get('file');
        const statusEl = document.getElementById('file-status');
        const btnText = document.getElementById('file-btn-text');

        if (url) {
            statusEl.innerHTML = "Загрузка из интернета...";
            btnText.innerHTML = "<div class='loader'></div> Загрузка...";
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("Network error");
                    return response.text();
                })
                .then(text => {
                    parseXML(text);
                    if (App.fragments.length > 0) {
                        statusEl.innerHTML = "✓ Файл загружен через URL";
                        document.getElementById('btn-start').disabled = false;
                        btnText.innerHTML = "Файл готов";
                    } else {
                        throw new Error("Пустой файл");
                    }
                })
                .catch(err => {
                    console.error(err);
                    statusEl.innerHTML = "❌ Ошибка загрузки по ссылке (проверьте CORS или URL)";
                    btnText.innerHTML = "Выбрать XML файл";
                });
        }
    };

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            parseXML(ev.target.result);
            document.getElementById('file-status').innerText = "✓ " + file.name;
            document.getElementById('btn-start').disabled = false;
        };
        reader.readAsText(file);
    });

    function loadDemoData() {
        const demo = `<readingTest>
            <fragment timeExcellent="20" timeGood="40">
                <text>Современное образование требует новых подходов. Активное чтение — это методика, позволяющая глубже понимать материал за счет анализа текста. Студент становится исследователем, а не просто потребителем информации. Это критически важный навык в 21 веке.</text>
                <questions>
                    <question type="choice"><text>Какую роль предлагает активное чтение студенту?</text><options><option>Наблюдателя</option><option correct="true">Исследователя</option><option>Критика</option></options></question>
                    <question type="input"><text>В каком веке мы живем? (Цифра)</text><answer>21</answer></question>
                </questions>
            </fragment>
            <fragment timeExcellent="30" timeGood="50">
                <text>Важным элементом является тестирование. Это улучшает память и помогает структурировать знания. Повторное тестирование закрепляет результат лучше, чем простое перечитывание материала.</text>
                <questions>
                    <question type="choice"><text>Что лучше закрепляет результат?</text><options><option>Перечитывание</option><option correct="true">Тестирование</option><option>Сон</option></options></question>
                </questions>
            </fragment>
        </readingTest>`;
        parseXML(demo);
        document.getElementById('file-status').innerText = "✓ Демо-данные загружены";
        document.getElementById('btn-start').disabled = false;
    }

    function parseXML(str) {
        try {
            const xml = new DOMParser().parseFromString(str, "text/xml");
            App.fragments = [];
            const frags = xml.querySelectorAll('fragment');
            if (frags.length === 0) console.warn("No fragments found");
            
            frags.forEach(f => {
                const txt = f.querySelector('text').textContent;
                const qList = [];
                f.querySelectorAll('question').forEach(q => {
                    const obj = { type: q.getAttribute('type'), text: q.querySelector('text').textContent };
                    if (obj.type === 'choice') {
                        obj.options = [];
                        q.querySelectorAll('option').forEach(o => obj.options.push({text: o.textContent, correct: o.getAttribute('correct')==='true'}));
                    } else {
                        obj.answer = q.querySelector('answer').textContent.toLowerCase().trim();
                    }
                    qList.push(obj);
                });
                App.fragments.push({
                    text: txt,
                    tExc: parseInt(f.getAttribute('timeExcellent')) || 30,
                    tGood: parseInt(f.getAttribute('timeGood')) || 60,
                    questions: qList
                });
            });
        } catch(e) {
            alert("Ошибка парсинга XML");
        }
    }

    function startTest() {
        if (!document.getElementById('input-fio').value.trim()) return alert("Введите ФИО");
        if (App.fragments.length === 0) return alert("Нет данных");

        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('screen-process').style.display = 'flex';
        document.getElementById('main-header').style.display = 'flex';
        
        App.currentFragIdx = 0;
        App.results = { times: [], answers: [] };
        
        renderPips();
        showFragment();
    }

    function renderPips() {
        const container = document.getElementById('pips-container');
        container.innerHTML = '';
        for (let i = 0; i < App.fragments.length + 1; i++) {
            const div = document.createElement('div');
            div.className = 'pip';
            if (i < App.currentFragIdx) div.classList.add('done');
            if (i === App.currentFragIdx) div.classList.add('active');
            container.appendChild(div);
        }
    }

    function showFragment() {
        const frag = App.fragments[App.currentFragIdx];
        
        document.getElementById('header-step').innerText = "Фрагмент " + (App.currentFragIdx + 1);
        document.getElementById('header-badge').innerText = "Чтение";
        document.getElementById('header-badge').style.background = "var(--accent)";
        
        clearInterval(App.timer);
        App.seconds = 0;
        const fill = document.getElementById('timer-fill');
        fill.style.width = '0%';
        fill.style.background = `linear-gradient(90deg, var(--success), #55efc4)`;
        
        App.timer = setInterval(() => {
            App.seconds++;
            let pct = (App.seconds / frag.tGood) * 100;
            fill.style.width = Math.min(100, pct) + '%';
            if(App.seconds > frag.tGood) fill.style.background = 'var(--danger)';
            else if(App.seconds > frag.tExc) fill.style.background = 'var(--warning)';
        }, 1000);

        const content = document.getElementById('content-area');
        content.innerHTML = frag.text;
        content.style.animation = 'none';
        content.offsetHeight; /* trigger reflow */
        content.style.animation = 'fadeIn 0.5s ease-out';
        
        document.getElementById('controls-area').innerHTML = `<button class="btn" onclick="startQuestions()">Готов к вопросам</button>`;
    }

    function startQuestions() {
        clearInterval(App.timer);
        const frag = App.fragments[App.currentFragIdx];
        App.results.times.push({spent: App.seconds, exc: frag.tExc, good: frag.tGood});
        App.mode = 'quiz';
        App.currentQIdx = 0;
        document.getElementById('header-badge').innerText = "Тест";
        document.getElementById('header-badge').style.background = "#e84393";
        renderQuestion();
    }

    function renderQuestion() {
        const list = (App.mode === 'quiz') ? App.fragments[App.currentFragIdx].questions : App.fragments.flatMap(f => f.questions);
        if (App.currentQIdx >= list.length) {
            if(App.mode === 'quiz') {
                if(App.currentFragIdx < App.fragments.length - 1) {
                    App.currentFragIdx++;
                    App.mode = 'reading';
                    renderPips();
                    showFragment();
                } else {
                    App.mode = 'final';
                    App.currentQIdx = 0;
                    renderPips();
                    document.getElementById('header-step').innerText = "Итог";
                    document.getElementById('header-badge').innerText = "Финал";
                    document.getElementById('content-area').innerHTML = "<div style='text-align:center; padding:60px 20px;'><h2 style='font-size:28px; margin-bottom:10px;'>Финальный тест</h2><p>Сейчас проверим, как вы запомнили материал.</p></div>";
                    document.getElementById('controls-area').innerHTML = `<button class="btn" onclick="renderQuestion()">Начать</button>`;
                }
            } else {
                finishTest();
            }
            return;
        }

        const q = list[App.currentQIdx];
        document.getElementById('header-step').innerText = "Вопрос " + (App.currentQIdx + 1);
        
        let html = `<div class="question-title">${q.text}</div>`;
        if (q.type === 'choice') {
            html += '<div class="options-list">';
            q.options.forEach(o => html += `<div class="option-item" onclick="selectOption(this)">${o.text}</div>`);
            html += '</div>';
        } else {
            html += `<input type="text" id="ans-input" style="width:100%; padding:14px; border:2px solid rgba(0,0,0,0.1); border-radius:12px; font-size:16px; font-family:inherit;" placeholder="Напишите ответ...">`;
        }
        document.getElementById('content-area').innerHTML = html;
        document.getElementById('controls-area').innerHTML = `
            <div class="feedback-msg" id="fb"></div>
            <button class="btn" onclick="submitAnswer()">Ответить</button>
        `;
    }

    function selectOption(el) {
        el.parentElement.querySelectorAll('.option-item').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
    }

    function submitAnswer() {
        const list = (App.mode === 'quiz') ? App.fragments[App.currentFragIdx].questions : App.fragments.flatMap(f => f.questions);
        const q = list[App.currentQIdx];
        let val = "", correct = false;
        const fb = document.getElementById('fb');

        if (q.type === 'choice') {
            const sel = document.querySelector('.option-item.selected');
            if(!sel) { fb.innerText = "Выберите вариант"; fb.className = "feedback-msg fb-error"; return; }
            val = sel.innerText;
            correct = q.options.find(o => o.text === val && o.correct);
            
            // Visual feedback
            document.querySelectorAll('.option-item').forEach(el => {
                const isCorrectOpt = q.options.find(o => o.text === el.innerText && o.correct);
                if (isCorrectOpt) el.classList.add('correct');
                if (el === sel && !correct) el.classList.add('wrong');
                el.style.pointerEvents = 'none'; // Disable further clicks
            });

        } else {
            val = document.getElementById('ans-input').value.trim();
            if(!val) { fb.innerText = "Введите ответ"; fb.className = "feedback-msg fb-error"; return; }
            correct = val.toLowerCase() === q.answer;
            const input = document.getElementById('ans-input');
            if(correct) input.style.borderColor = 'var(--success)';
            else input.style.borderColor = 'var(--danger)';
        }

        if (correct) {
            fb.innerText = "Отлично!";
            fb.className = "feedback-msg fb-success";
            App.results.answers.push({stage: App.mode, text: q.text, ans: val, correct: true});
            App.currentQIdx++;
            setTimeout(renderQuestion, 1000);
        } else {
            fb.innerText = "Неверно, попробуйте еще раз.";
            fb.className = "feedback-msg fb-error";
            // Re-enable pointer events for retry
            if(q.type === 'choice') {
                document.querySelectorAll('.option-item').forEach(el => {
                   el.style.pointerEvents = 'auto';
                   el.classList.remove('correct', 'wrong', 'selected');
                });
            }
        }
    }

    function finishTest() {
        document.getElementById('main-header').style.display = 'none';
        document.getElementById('screen-process').style.display = 'none';
        document.getElementById('screen-result').style.display = 'flex';
        
        const totalSec = App.results.times.reduce((s,t) => s+t.spent, 0);
        const errs = App.results.answers.filter(a => !a.correct).length;
        
        document.getElementById('final-fio').innerText = document.getElementById('input-fio').value;
        
        // Grade calculation
        let grade = 5;
        if(errs > 0) grade = 4;
        if(errs > 1) grade = 3;
        if(errs > 3) grade = 2;
        
        document.getElementById('final-grade-val').innerText = grade;
        document.getElementById('stat-time').innerText = Math.floor(totalSec/60) + "м " + (totalSec%60) + "с";
        document.getElementById('stat-errors').innerText = errs;

        const tbody = document.querySelector('#results-table tbody');
        tbody.innerHTML = '';
        App.results.answers.forEach(a => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${a.text}</td>
                <td>${a.ans}</td>
                <td><span class="status-badge ${a.correct ? 'status-correct' : 'status-wrong'}">${a.correct ? 'Верно' : 'Ошибка'}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
